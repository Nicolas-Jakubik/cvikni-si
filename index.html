<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CvikniSi - Vedúci</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="lead-page">
    <div class="container lead-container">
        <div class="header-simple">
            <h1>CvikniSi</h1>
        </div>

        <div class="form-container">
            <h2>Zadaj hodiny</h2>
            
            <form id="attendanceForm">
                <div class="form-group">
                    <label>Meno:</label>
                    <select id="employeeName" required>
                        <option value="">Vyber meno</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Projekt:</label>
                    <select id="projectName" required>
                        <option value="">Vyber projekt</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Dátum:</label>
                    <input type="date" id="workDate" required>
                </div>

                <div class="time-row">
                    <div class="time-field">
                        <label>Od:</label>
                        <input type="time" id="timeFrom" value="07:00" required>
                    </div>

                    <div class="time-field">
                        <label>Do:</label>
                        <input type="time" id="timeTo" value="18:00" required>
                    </div>

                    <div class="time-field">
                        <label>Prestávka (min):</label>
                        <input type="number" id="breakMinutes" value="30" min="0" max="480" required>
                    </div>
                </div>

                <div class="hours-box">
                    Hodiny: <span id="hoursCalculated">0</span> h
                </div>

                <button type="submit" class="btn-submit">Cviknúť Hodiny</button>
            </form>

            <div id="message" class="message"></div>
        </div>

        <div class="admin-btn-container">
            <button class="btn-admin-small" onclick="goToAdmin()">Admin</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CvikniSi - Admin Panel</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="admin-page">
    <!-- LOGIN MODAL -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>CvikniSi Admin</h2>
                <p>Prihlás sa do panelu</p>
            </div>
            <input type="password" id="adminPassword" placeholder="Zadaj admin heslo" class="modal-input">
            <button onclick="loginAdmin()" class="btn-login">Prihlásiť sa</button>
            <div id="loginMessage" class="message"></div>
            <hr class="modal-divider">
            <button onclick="backToLead()" class="btn-back">← Späť na Vedúci formulár</button>
        </div>
    </div>

    <!-- ADMIN PANEL -->
    <div id="adminPanel" style="display: none;" class="admin-wrapper">
        <!-- SIDEBAR -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h1>CvikniSi</h1>
                <p>Admin Panel</p>
            </div>

            <nav class="sidebar-nav">
                <button class="nav-item active" onclick="switchSection('dashboard')">
                    <span>📊</span> Dashboard
                </button>
                <button class="nav-item" onclick="switchSection('employees')">
                    <span>👥</span> Zamestnanci
                </button>
                <button class="nav-item" onclick="switchSection('projects')">
                    <span>📦</span> Projekty
                </button>
                <button class="nav-item" onclick="switchSection('attendance')">
                    <span>📋</span> Dochádzka
                </button>
                <button class="nav-item" onclick="switchSection('salaries')">
                    <span>💰</span> Výplaty
                </button>
            </nav>

            <button onclick="logoutAdmin()" class="btn-logout-sidebar">
                <span>🚪</span> Odhlásiť sa
            </button>
        </div>

        <!-- MAIN CONTENT -->
        <div class="admin-main">
            <!-- TOPBAR -->
            <div class="topbar">
                <h2 id="sectionTitle">Dashboard</h2>
                <button onclick="backToLead()" class="btn-back-top">← Späť</button>
            </div>

            <!-- CONTENT SECTIONS -->
            <div class="content">
                <!-- DASHBOARD -->
                <section id="dashboard" class="section active">
                    <div class="dashboard-grid">
                        <div id="dashboard" class="dashboard"></div>
                    </div>
                </section>

                <!-- ZAMESTNANCI -->
                <section id="employees" class="section">
                    <div class="section-header">
                        <h3>Správa zamestnancov</h3>
                        <button onclick="openAddEmployee()" class="btn-add">+ Pridaj zamestnanca</button>
                    </div>

                    <div class="add-form" id="addEmployeeForm" style="display: none;">
                        <input type="text" id="newEmployeeName" placeholder="Meno" class="form-input">
                        <input type="number" id="newEmployeeRate" placeholder="Hodinová mzda" step="0.01" class="form-input">
                        <div class="form-actions">
                            <button onclick="addEmployee()" class="btn-submit-form">Ulož</button>
                            <button onclick="closeAddEmployee()" class="btn-cancel">Zrušiť</button>
                        </div>
                    </div>

                    <div id="employeesList" class="list-container"></div>
                </section>

                <!-- PROJEKTY -->
                <section id="projects" class="section">
                    <div class="section-header">
                        <h3>Správa projektov</h3>
                        <button onclick="openAddProject()" class="btn-add">+ Pridaj projekt</button>
                    </div>

                    <div class="add-form" id="addProjectForm" style="display: none;">
                        <input type="text" id="newProjectName" placeholder="Názov projektu" class="form-input">
                        <div class="form-actions">
                            <button onclick="addProject()" class="btn-submit-form">Ulož</button>
                            <button onclick="closeAddProject()" class="btn-cancel">Zrušiť</button>
                        </div>
                    </div>

                    <div id="projectsList" class="list-container"></div>
                </section>

                <!-- DOCHÁDZKA -->
                <section id="attendance" class="section">
                    <div class="section-header">
                        <h3>Správa dochádzky - <span id="attendanceMonth"></span></h3>
                    </div>

                    <div id="attendanceList" class="list-container"></div>
                </section>

                <!-- VÝPLATY -->
                <section id="salaries" class="section">
                    <div class="section-header">
                        <h3>Výplaty za mesiac</h3>
                        <div class="filter-row">
                            <input type="month" id="salaryMonth" class="form-input">
                            <button onclick="calculateSalaries()" class="btn-filter">Vypočítaj</button>
                        </div>
                    </div>

                    <div id="salariesList" class="salaries-container"></div>
                </section>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
